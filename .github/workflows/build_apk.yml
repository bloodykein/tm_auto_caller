name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          path: mysource

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: stable

      - name: Create Flutter scaffold
        run: flutter create --org com.tmapp --project-name tm_auto_caller --platforms android freshapp

      - name: Replace lib folder
        run: |
          rm -rf freshapp/lib
          cp -r mysource/lib freshapp/lib

      - name: Remove unused service files
        run: |
          rm -f freshapp/lib/services/firebase_sync_service.dart
          rm -f freshapp/lib/services/google_sheets_service.dart
          rm -f freshapp/lib/models/sync_config.dart

      - name: Write cloud_sync_service stub
        run: echo "" | base64 -d > freshapp/lib/services/cloud_sync_service.dart

      - name: Add file_paths.xml
        run: |
          mkdir -p freshapp/android/app/src/main/res/xml
          printf '<?xml version="1.0" encoding="utf-8"?>\n<paths xmlns:android="http://schemas.android.com/apk/res/android">\n  <external-path name="external_files" path="."/>\n  <cache-path name="cache" path="."/>\n</paths>\n' > freshapp/android/app/src/main/res/xml/file_paths.xml

      - name: Patch AndroidManifest permissions
        run: |
          python3 -c "
          import re, sys
          with open('freshapp/android/app/src/main/AndroidManifest.xml') as f: c = f.read()
          perms = '<uses-permission android:name=\"android.permission.READ_CONTACTS\"/>\n    <uses-permission android:name=\"android.permission.CALL_PHONE\"/>\n    <uses-permission android:name=\"android.permission.READ_PHONE_STATE\"/>\n    <uses-permission android:name=\"android.permission.WRITE_EXTERNAL_STORAGE\" android:maxSdkVersion=\"28\"/>\n    <uses-permission android:name=\"android.permission.READ_EXTERNAL_STORAGE\" android:maxSdkVersion=\"32\"/>\n    <uses-permission android:name=\"android.permission.INTERNET\"/>\n    <uses-permission android:name=\"android.permission.ACCESS_NETWORK_STATE\"/>\n    '
          fp = '<provider android:name=\"androidx.core.content.FileProvider\" android:authorities=\"\${applicationId}.fileprovider\" android:exported=\"false\" android:grantUriPermissions=\"true\"><meta-data android:name=\"android.support.FILE_PROVIDER_PATHS\" android:resource=\"@xml/file_paths\"/></provider>'
          c = c.replace('<application', perms + '<application', 1)
          c = c.replace('</application>', fp + '</application>', 1)
          c = re.sub(r'android:label=\"[^\"]*\"', 'android:label=\"TM AutoCaller\"', c)
          with open('freshapp/android/app/src/main/AndroidManifest.xml', 'w') as f: f.write(c)
          print('Manifest patched OK')
          "

      - name: Write pubspec.yaml
        run: echo "" | base64 -d > freshapp/pubspec.yaml

      - name: Flutter pub get
        working-directory: freshapp
        run: flutter pub get

      - name: Build release AAB
        working-directory: freshapp
        run: flutter build appbundle --release

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: TM-AutoCaller-v4-AAB
          path: freshapp/build/app/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TM-AutoCaller-v4
          path: freshapp/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
