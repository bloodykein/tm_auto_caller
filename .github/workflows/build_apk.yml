name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout source
        uses: actions/checkout@v4
        with:
          path: mysource

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '17'

      - name: Setup Flutter 3.22.0
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.22.0
          channel: stable

      - name: Create fresh Flutter scaffold
        run: flutter create --org com.tmapp --project-name tm_auto_caller --platforms android freshapp

      - name: Replace lib with our source
        run: |
          rm -rf freshapp/lib
          cp -r mysource/lib freshapp/lib

      - name: Copy Android permissions files
        run: |
          mkdir -p freshapp/android/app/src/main/res/xml
          cp mysource/android/app/src/main/res/xml/file_paths.xml freshapp/android/app/src/main/res/xml/file_paths.xml

      - name: Update AndroidManifest
        run: cp mysource/android/app/src/main/AndroidManifest.xml freshapp/android/app/src/main/AndroidManifest.xml

      - name: Write pubspec.yaml
        run: |
          printf 'name: tm_auto_caller\ndescription: TM Auto Caller v4\nversion: 4.0.0+4\n\nenvironment:\n  sdk: ">=3.0.0 <4.0.0"\n\ndependencies:\n  flutter:\n    sdk: flutter\n  flutter_contacts: ^1.1.9+2\n  url_launcher: ^6.2.0\n  permission_handler: ^10.4.5\n  sqflite: ^2.3.0\n  path: ^1.8.3\n  provider: ^6.0.5\n  excel: ^3.0.0\n  share_plus: ^7.2.2\n  path_provider: ^2.1.1\n  connectivity_plus: ^5.0.2\n\ndev_dependencies:\n  flutter_test:\n    sdk: flutter\n  flutter_lints: ^3.0.0\n\nflutter:\n  uses-material-design: true\n' > freshapp/pubspec.yaml

      - name: Remove unused files
        run: |
          rm -f freshapp/lib/services/firebase_sync_service.dart
          rm -f freshapp/lib/services/google_sheets_service.dart
          rm -f freshapp/lib/models/sync_config.dart

      - name: Flutter pub get
        working-directory: freshapp
        run: flutter pub get

      - name: Build release APK
        working-directory: freshapp
        run: flutter build apk --release --no-shrink

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TM-AutoCaller-v4
          path: freshapp/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
