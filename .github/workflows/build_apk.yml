name: Build Signed AAB
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          path: mysource

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: stable

      - name: Fix Android SDK Platform 35
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --uninstall "platforms;android-35" 2>/dev/null || true
          rm -rf $ANDROID_HOME/platforms/android-35 2>/dev/null || true
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-35" "build-tools;35.0.0"
          ls -lh $ANDROID_HOME/platforms/android-35/android.jar

      - name: Create Flutter scaffold
        run: flutter create --org com.tmapp --project-name tm_auto_caller --platforms android freshapp

      - name: Replace lib folder
        run: |
          rm -rf freshapp/lib
          cp -r mysource/lib freshapp/lib

      - name: Remove unused service files
        run: |
          rm -f freshapp/lib/services/firebase_sync_service.dart
          rm -f freshapp/lib/services/google_sheets_service.dart
          rm -f freshapp/lib/models/sync_config.dart

      - name: Write cloud_sync_service stub
        run: echo "" | base64 -d > freshapp/lib/services/cloud_sync_service.dart

      - name: Add file_paths.xml
        run: |
          mkdir -p freshapp/android/app/src/main/res/xml
          printf '<?xml version="1.0" encoding="utf-8"?>\n<paths xmlns:android="http://schemas.android.com/apk/res/android">\n  <external-path name="external_files" path="."/>\n  <cache-path name="cache" path="."/>\n</paths>\n' > freshapp/android/app/src/main/res/xml/file_paths.xml

      - name: Patch AndroidManifest permissions
        run: |
          python3 << 'PYEOF'
          import re

          with open('freshapp/android/app/src/main/AndroidManifest.xml') as f:
              c = f.read()

          perms = '\n'.join([
              '<uses-permission android:name="android.permission.READ_CONTACTS"/>',
              '<uses-permission android:name="android.permission.CALL_PHONE"/>',
              '<uses-permission android:name="android.permission.READ_PHONE_STATE"/>',
              '<uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" android:maxSdkVersion="28"/>',
              '<uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32"/>',
              '<uses-permission android:name="android.permission.INTERNET"/>',
              '<uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"/>',
              '<uses-permission android:name="android.permission.FOREGROUND_SERVICE"/>',
              '<uses-permission android:name="android.permission.FOREGROUND_SERVICE_PHONE_CALL"/>',
              '<uses-permission android:name="android.permission.MANAGE_OWN_CALLS"/>',
              '<uses-permission android:name="android.permission.POST_NOTIFICATIONS"/>',
          ]) + '\n'

          fp = (
              '<provider android:name="androidx.core.content.FileProvider" '
              'android:authorities="${applicationId}.fileprovider" '
              'android:exported="false" android:grantUriPermissions="true">'
              '<meta-data android:name="android.support.FILE_PROVIDER_PATHS" '
              'android:resource="@xml/file_paths"/></provider>'
              '<service android:name="com.redevrx.flutter_phone_call_state.receiver.CallMonitoringService" '
              'android:enabled="true" android:exported="false" '
              'android:foregroundServiceType="phoneCall"/>'
          )

          c = c.replace('<application', perms + '<application', 1)
          c = c.replace('</application>', fp + '</application>', 1)
          c = re.sub(r'android:label="[^"]*"', 'android:label="TM AutoCaller"', c)

          with open('freshapp/android/app/src/main/AndroidManifest.xml', 'w') as f:
              f.write(c)

          print('Manifest patched OK')
          PYEOF

      - name: Write pubspec.yaml
        run: |
          # 2024-01-01 기준 경과 분을 versionCode로 사용 (자동 증가)
          VERSION_CODE=$(python3 -c "
          from datetime import datetime, timezone
          base = datetime(2024, 1, 1, tzinfo=timezone.utc)
          now = datetime.now(timezone.utc)
          print(int((now - base).total_seconds() // 60))
          ")
          echo "Auto versionCode: $VERSION_CODE"
          cat > freshapp/pubspec.yaml << PUBSPEC
          name: tm_auto_caller
          description: TM Auto Caller v4
          version: 4.0.3+${VERSION_CODE}

          environment:
            sdk: ">=3.0.0 <4.0.0"

          dependencies:
            flutter:
              sdk: flutter
            flutter_contacts: ^1.1.9+2
            url_launcher: ^6.2.0
            permission_handler: ^10.4.5
            sqflite: ^2.3.0
            path: ^1.8.3
            provider: ^6.0.5
            excel: ^4.0.6
            share_plus: ^9.0.0
            path_provider: ^2.1.1
            connectivity_plus: ^5.0.2
            flutter_phone_call_state: 0.1.0
            shared_preferences: ^2.2.2

          dev_dependencies:
            flutter_test:
              sdk: flutter
            flutter_lints: ^3.0.0

          flutter:
            uses-material-design: true
          PUBSPEC

      - name: Decode Keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > freshapp/android/app/tm_auto_caller.jks

      - name: Write key.properties
        run: |
          printf 'storePassword=${{ secrets.KEY_STORE_PASSWORD }}\nkeyPassword=${{ secrets.KEY_PASSWORD }}\nkeyAlias=${{ secrets.KEY_ALIAS }}\nstoreFile=tm_auto_caller.jks\n' > freshapp/android/key.properties

      - name: Write build.gradle with signing
        run: echo "" | base64 -d | python3

      - name: Flutter pub get
        working-directory: freshapp
        run: flutter pub get

      - name: Build signed AAB
        working-directory: freshapp
        run: flutter build appbundle --release

      - name: Upload signed AAB
        uses: actions/upload-artifact@v4
        with:
          name: TM-AutoCaller-v4-Signed-AAB
          path: freshapp/build/app/outputs/bundle/release/app-release.aab
          retention-days: 30
